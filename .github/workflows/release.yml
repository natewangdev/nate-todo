# 合并到 main 后按 package.json 的 version 构建 Windows 安装包并创建 GitHub Release（附带 exe）。
# 同一版本只创建一次；要发新版本请先 bump package.json 中的 version。

name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    # 在 job 级别暴露 token，供后续所有 step 使用（electron-builder / gh CLI / 上传都能读取）
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Read version and detect existing release
        id: meta
        shell: bash
        env:
          # 确保 gh CLI 能认证；使用 secrets.GITHUB_TOKEN 而不是不存在的 github.token
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          if gh release view "${TAG}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "release_exists=true" >> $GITHUB_OUTPUT
          else
            echo "release_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.meta.outputs.release_exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.meta.outputs.release_exists == 'false'
        run: npm ci

      - name: Build Windows installers
        if: steps.meta.outputs.release_exists == 'false'
        run: npm run build
        env:
          # job 级别已设置 GH_TOKEN/GITHUB_TOKEN，上面这行可选但更显式
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Create GitHub Release with artifacts
        if: steps.meta.outputs.release_exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}